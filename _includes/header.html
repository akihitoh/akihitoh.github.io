{%- assign p = page.url -%}
<header class="site-header">
  <nav class="nav">
    {%- if page.lang == 'en' -%}
      <a class="brand en" href="{{ "/about-en/" | relative_url }}">
        <span class="brand-jp">Akihito Hiromori</span>
        <span class="brand-en">Osaka University</span>
      </a>
      <button class="nav-toggle" aria-label="Menu" onclick="document.getElementById('navlinks').classList.toggle('open')"><span></span></button>
      <div class="nav-links" id="navlinks">
        <a href="{{ "/about-en/" | relative_url }}#research">Research</a>
        <a href="{{ "/works/" | relative_url }}"{% if p contains 'works' %} class="active"{% endif %}>Publications</a>
        <a href="{{ "/about-en/" | relative_url }}#cv">CV</a>
        <a class="pill" href="{{ "/" | relative_url }}">日本語</a>
      </div>
    {%- else -%}
      <a class="brand" href="{{ "/" | relative_url }}">
        <span class="brand-jp">廣森 聡仁</span>
        <span class="brand-en">Akihito Hiromori</span>
      </a>
      <button class="nav-toggle" aria-label="メニュー" onclick="document.getElementById('navlinks').classList.toggle('open')"><span></span></button>
      <div class="nav-links" id="navlinks">
        <a href="{{ "/" | relative_url }}#themes">研究テーマ</a>
        <a href="{{ "/works/" | relative_url }}"{% if p contains 'works' %} class="active"{% endif %}>業績</a>
        <a href="{{ "/funds/" | relative_url }}"{% if p contains 'funds' %} class="active"{% endif %}>研究資金</a>
        <a href="{{ "/" | relative_url }}#contact">連絡先</a>
        <a class="pill" href="{{ "/about-en/" | relative_url }}">EN</a>
      </div>
    {%- endif -%}
  </nav>
</header>
