remote_theme: jekyll/minima

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

title: 廣森 聡仁 (Akihito Hiromori)
description: "大阪大学 D3センター 准教授 廣森聡仁の研究紹介・業績・研究資金。"
lang: ja
show_downloads: false

# ナビゲーションは _includes/header.html で独自定義（minima の header_pages は未使用）
# header_pages はテーマ側のフォールバックとして残置
header_pages:
  - works.html
  - funds.html
  - about-en.html

# Jekyllビルドから除外
exclude:
  - CLAUDE.md
  - README.md
  - SETUP.md
  - plans/
  - homepage/
  - Gemfile
  - Gemfile.lock
  - docker-compose.yml
  - feed.xml

# Minimaテーマのソーシャルリンクを無効化
minima:
  social_links: []
